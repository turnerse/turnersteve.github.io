<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Tic Tac Toe vs Bot</title>
<style>
  :root {
    --bg: #0f172a;
    --panel: #111827;
    --accent: #38bdf8;
    --x: #f97316;
    --o: #22c55e;
    --text: #e5e7eb;
  }
  * { box-sizing: border-box; font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif; }
  body {
    margin: 0; min-height: 100vh; display: grid; place-items: center;
    background: radial-gradient(1200px circle at top, #1e293b, var(--bg));
    color: var(--text);
  }
  .card {
    background: var(--panel); padding: 24px; border-radius: 16px; width: 340px;
    box-shadow: 0 20px 50px rgba(0,0,0,.35);
  }
  h1 { margin: 0 0 12px; font-size: 20px; font-weight: 700; }
  .status { margin-bottom: 12px; font-size: 14px; color: #cbd5f5; }
  .board {
    display: grid; grid-template-columns: repeat(3, 1fr);
    gap: 8px; margin: 12px 0 16px;
  }
  .cell {
    height: 90px; display: grid; place-items: center;
    font-size: 36px; font-weight: 800; border-radius: 12px;
    background: #0b1220; cursor: pointer;
    border: 1px solid #1f2937; transition: transform .1s ease, border-color .2s;
  }
  .cell:hover { transform: translateY(-2px); border-color: var(--accent); }
  .cell.x { color: var(--x); }
  .cell.o { color: var(--o); }
  button {
    width: 100%; padding: 10px 12px; border: 0; border-radius: 10px;
    background: var(--accent); color: #0b1220; font-weight: 700; cursor: pointer;
  }
  button:hover { filter: brightness(0.95); }
  .hint { margin-top: 8px; font-size: 12px; color: #94a3b8; }
</style>
</head>
<body>
  <div class="card">
    <h1>Tic‑Tac‑Toe vs Bot</h1>
    <div class="status" id="status">Your turn (X)</div>
    <div class="board" id="board"></div>
    <button id="reset">Reset Game</button>
    <div class="hint">You are X. Bot is O.</div>
  </div>

<script>
  const boardEl = document.getElementById('board');
  const statusEl = document.getElementById('status');
  const resetBtn = document.getElementById('reset');

  let board = Array(9).fill(null);
  let gameOver = false;
  const human = 'X';
  const bot = 'O';

  const wins = [
    [0,1,2],[3,4,5],[6,7,8],
    [0,3,6],[1,4,7],[2,5,8],
    [0,4,8],[2,4,6]
  ];

  function render() {
    boardEl.innerHTML = '';
    board.forEach((val, i) => {
      const cell = document.createElement('div');
      cell.className = `cell ${val ? val.toLowerCase() : ''}`;
      cell.textContent = val || '';
      cell.addEventListener('click', () => handleMove(i));
      boardEl.appendChild(cell);
    });
  }

  function checkWinner(b) {
    for (const [a,b2,c] of wins) {
      if (b[a] && b[a] === b[b2] && b[a] === b[c]) return b[a];
    }
    return b.includes(null) ? null : 'draw';
  }

  function handleMove(i) {
    if (gameOver || board[i]) return;
    board[i] = human;
    updateState();
    if (!gameOver) {
      statusEl.textContent = 'Bot thinking...';
      setTimeout(botMove, 250);
    }
  }

  function botMove() {
    const move = bestBotMove();
    if (move !== null) board[move] = bot;
    updateState();
  }

  function bestBotMove() {
    // 1) Win if possible
    for (let i = 0; i < 9; i++) {
      if (!board[i]) {
        const test = board.slice(); test[i] = bot;
        if (checkWinner(test) === bot) return i;
      }
    }
    // 2) Block player
    for (let i = 0; i < 9; i++) {
      if (!board[i]) {
        const test = board.slice(); test[i] = human;
        if (checkWinner(test) === human) return i;
      }
    }
    // 3) Center > corners > edges
    const priorities = [4,0,2,6,8,1,3,5,7];
    return priorities.find(i => !board[i]) ?? null;
  }

  function updateState() {
    render();
    const winner = checkWinner(board);
    if (winner) {
      gameOver = true;
      statusEl.textContent = winner === 'draw'
        ? "It's a draw!"
        : (winner === human ? "You win! 🎉" : "Bot wins!");
      return;
    }
    statusEl.textContent = 'Your turn (X)';
  }

  function reset() {
    board = Array(9).fill(null);
    gameOver = false;
    statusEl.textContent = 'Your turn (X)';
    render();
  }

  resetBtn.addEventListener('click', reset);
  render();
</script>
</body>
</html>
